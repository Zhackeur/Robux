<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robux Generator (Simulation)</title>
<style>
body {
  background: linear-gradient(135deg,#0f172a,#020617);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 40px 10px;
}
.box {
  background: #1e293b;
  max-width: 360px;
  margin: auto;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 0 25px black;
}
h2 {
  margin-bottom: 10px;
}
input, button {
  width: 90%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}
button {
  background: #22c55e;
  font-weight: bold;
  cursor: pointer;
}
#progressBox {
  width: 100%;
  background: #334155;
  border-radius: 10px;
  margin-top: 15px;
  display: none;
}
#bar {
  height: 20px;
  width: 0%;
  background: #22c55e;
  border-radius: 10px;
}
#result {
  margin-top: 15px;
  font-weight: bold;
}
footer {
  margin-top: 20px;
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>
<body>

<div class="box">
  <h2>💰 Robux Generator</h2>
  <p>Enter your Roblox username and amount</p>

  <input type="text" id="username" placeholder="Nom d'utilisateur Roblox">
  <input type="number" id="amount" placeholder="Montant de Robux">
  <button onclick="generate()">Generate</button>

  <div id="progressBox">
    <div id="bar"></div>
  </div>

  <div id="result"></div>
</div>

<footer>
⚠️ Simulation prank & éducative – aucun Robux réel
</footer>

<script>
function generate() {
  const user = document.getElementById("username").value;
  const amount = document.getElementById("amount").value;
  const bar = document.getElementById("bar");
  const box = document.getElementById("progressBox");
  const result = document.getElementById("result");

  if (user === "" || amount === "") {
    result.innerHTML = "❌ Remplis tous les champs.";
    return;
  }

  let progress = 0;
  box.style.display = "block";
  result.innerHTML = "Connexion aux serveurs Roblox...";
  bar.style.width = "0%";

  let interval = setInterval(() => {
    progress += 10;
    bar.style.width = progress + "%";

    if (progress === 30) {
      result.innerHTML = "Vérification du compte...";
    }
    if (progress === 60) {
      result.innerHTML = "Génération de " + amount + " Robux pour " + user + "...";
    }
    if (progress >= 100) {
      clearInterval(interval);
      result.innerHTML = "😂 C'ÉTAIT UNE BLAGUE<br>❌ Aucun Robux ne peut être généré gratuitement.";
    }
  }, 500);
}
</script>

</body>
</html>
