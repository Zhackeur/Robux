<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robux Generator</title>

<style>
body{
  background: radial-gradient(circle at top,#0f5132,#020617);
  font-family: Arial, sans-serif;
  text-align:center;
  color:white;
  padding:25px 10px;
}
.logo{
  font-size:34px;
  font-weight:900;
  color:#22c55e;
  text-shadow:0 0 10px #22c55e,0 0 20px #16a34a;
  margin-bottom:10px;
}
.box{
  background:rgba(2,44,34,.95);
  max-width:380px;
  margin:auto;
  padding:25px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(34,197,94,.6);
}
input,button{
  width:90%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}
input{background:#064e3b;color:white}
button{
  background:linear-gradient(135deg,#22c55e,#4ade80);
  font-weight:bold;
  cursor:pointer;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 5px #22c55e}
  50%{box-shadow:0 0 25px #22c55e}
  100%{box-shadow:0 0 5px #22c55e}
}
#progressBox{
  width:100%;
  background:#064e3b;
  border-radius:10px;
  margin-top:15px;
  display:none;
}
#bar{
  height:20px;
  width:0%;
  background:linear-gradient(90deg,#22c55e,#86efac);
  border-radius:10px;
  box-shadow:0 0 15px #22c55e;
  transition:width .3s;
}
#captcha{
  margin-top:15px;
  background:#052e16;
  border:2px dashed #22c55e;
  padding:10px;
  display:none;
  border-radius:8px;
}
#captcha span{
  font-weight:bold;
  color:#22c55e;
  font-size:20px;
}
#result{margin-top:15px;font-weight:bold}
#winners{
  margin-top:20px;
  background:rgba(2,44,34,.8);
  border-radius:15px;
  padding:10px;
  box-shadow:0 0 20px rgba(34,197,94,.4);
  font-size:14px;
}
#winners span{color:#4ade80;font-weight:bold}
footer{
  margin-top:15px;
  font-size:12px;
  color:#86efac;
}
</style>
</head>

<body>

<div class="logo">ROBLOX GENERATOR</div>

<div class="box">
  <h2>💰 Robux Generator</h2>
  <input id="username" placeholder="Nom d'utilisateur Roblox">
  <input id="amount" type="number" placeholder="Montant de Robux">
  <button onclick="generate()">GENERATE</button>

  <div id="captcha">Clique sur <span id="captchaText"></span> pour vérifier</div>
  <div id="progressBox"><div id="bar"></div></div>
  <div id="result"></div>
</div>

<div id="winners">
  🎉 <span id="winnerName">AlexPro</span> vient de gagner <span id="winnerAmount">500</span> Robux !
</div>

<footer>
Simulation visuelle
</footer>

<audio id="loadSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_3f8b5d3d3a.mp3"></audio>
<audio id="winSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_1c2d4b0e3a.mp3"></audio>

<script>
const names=["AlexPro","Noob123","DarkPlayer","LunaGirl","MegaBoy","ShadowKid","XxPlayerxX"];
const amounts=[100,250,500,1000,2000];

setInterval(()=>{
  const n=names[Math.floor(Math.random()*names.length)];
  const a=amounts[Math.floor(Math.random()*amounts.length)];
  document.getElementById("winnerName").textContent=n;
  document.getElementById("winnerAmount").textContent=a;
  document.getElementById("winSound").play();
},3000);

function generate(){
  const user=document.getElementById("username").value;
  const amount=document.getElementById("amount").value;
  const bar=document.getElementById("bar");
  const box=document.getElementById("progressBox");
  const result=document.getElementById("result");
  const captcha=document.getElementById("captcha");
  const captchaText=document.getElementById("captchaText");
  const sound=document.getElementById("loadSound");

  if(!user||!amount){
    result.innerHTML="❌ Remplis tous les champs.";
    return;
  }

  const letters="ABCDEFGHJKLMNPQRSTUVWXYZ";
  captchaText.textContent=letters[Math.floor(Math.random()*letters.length)];
  captcha.style.display="block";
  result.innerHTML="Vérification humaine requise...";

  captcha.onclick=()=>{
    captcha.style.display="none";
    box.style.display="block";
    bar.style.width="0%";
    let progress=0;
    sound.play();

    const messages=[
      "Connexion aux serveurs Roblox...",
      "Vérification du compte...",
      "Analyse de sécurité...",
      "Génération de "+amount+" Robux pour "+user+"..."
    ];
    let msgIndex=0;

    const interval=setInterval(()=>{
      progress+=5;
      bar.style.width=progress+"%";
      if(progress%20===0 && msgIndex<messages.length){
        result.innerHTML=messages[msgIndex++];
      }
      if(progress>=100){
        clearInterval(interval);
        sound.pause();
        result.innerHTML="😂 BLAGUE !<br>Les générateurs de Robux gratuits n'existent pas.<br>Fais attention aux faux sites.";
      }
    },250);
  }
}
</script>

</body>
</html>
